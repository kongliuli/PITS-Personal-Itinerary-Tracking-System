<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Core Value Art</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        .status-display {
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 12px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>MVP Core Value</h1>
            <div class="subtitle">最小可行产品 · 核心价值美学</div>

            <div class="control-section">
                <h3>种子</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← 上一个</button>
                    <button class="button secondary" onclick="nextSeed()">下一个 →</button>
                </div>
                <button class="button tertiary" onclick="randomSeedAndUpdate()">↻ 随机</button>
            </div>

            <div class="control-section">
                <h3>参数</h3>
                
                <div class="control-group">
                    <label>核心粒子数</label>
                    <div class="slider-container">
                        <input type="range" id="coreParticles" min="50" max="500" step="25" value="200" oninput="updateParam('coreParticles', this.value)">
                        <span class="value-display" id="coreParticles-value">200</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>核心半径</label>
                    <div class="slider-container">
                        <input type="range" id="coreRadius" min="50" max="300" step="10" value="150" oninput="updateParam('coreRadius', this.value)">
                        <span class="value-display" id="coreRadius-value">150</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>螺旋密度</label>
                    <div class="slider-container">
                        <input type="range" id="spiralDensity" min="0.5" max="3.0" step="0.1" value="1.5" oninput="updateParam('spiralDensity', this.value)">
                        <span class="value-display" id="spiralDensity-value">1.5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>进化迭代</label>
                    <div class="slider-container">
                        <input type="range" id="evolutionSpeed" min="1" max="10" step="1" value="5" oninput="updateParam('evolutionSpeed', this.value)">
                        <span class="value-display" id="evolutionSpeed-value">5</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>色彩</h3>
                
                <div class="color-group">
                    <label>核心色</label>
                    <div class="color-picker-container">
                        <input type="color" id="coreColor" value="#d4a574" onchange="updateColor('coreColor', this.value)">
                        <span class="color-value" id="coreColor-value">#d4a574</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>边缘色</label>
                    <div class="color-picker-container">
                        <input type="color" id="edgeColor" value="#5a7a9a" onchange="updateColor('edgeColor', this.value)">
                        <span class="color-value" id="edgeColor-value">#5a7a9a</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>强调色</label>
                    <div class="color-picker-container">
                        <input type="color" id="accentColor" value="#8b6f47" onchange="updateColor('accentColor', this.value)">
                        <span class="color-value" id="accentColor-value">#8b6f47</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>操作</h3>
                <div class="button-row">
                    <button class="button" onclick="regenerate()">重新生成</button>
                </div>
                <div class="button-row" style="margin-top: 8px;">
                    <button class="button secondary" onclick="resetParameters()">重置</button>
                    <button class="button tertiary" onclick="downloadImage()">下载</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">初始化核心价值生成器...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            coreParticles: 200,
            coreRadius: 150,
            spiralDensity: 1.5,
            evolutionSpeed: 5,
            coreColor: '#d4a574',
            edgeColor: '#5a7a9a',
            accentColor: '#8b6f47'
        };

        let defaultParams = {...params};

        let particles = [];
        let evolutionPhase = 0;
        let isEvolved = false;
        let canvas;

        const PHI = (1 + Math.sqrt(5)) / 2;
        const GOLDEN_ANGLE = Math.PI * (3 - Math.sqrt(5));

        function setup() {
            canvas = createCanvas(1000, 1000);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            particles = [];
            evolutionPhase = 0;
            isEvolved = false;

            background(250, 249, 245);

            generateInitialPopulation();

            for (let i = 0; i < 3; i++) {
                evolveOnce();
            }

            isEvolved = true;
            drawFinal();
        }

        function generateInitialPopulation() {
            let centerX = width / 2;
            let centerY = height / 2;

            for (let i = 0; i < params.coreParticles; i++) {
                let normalizedIndex = i / params.coreParticles;

                let angle = normalizedIndex * TWO_PI * params.spiralDensity * PHI;
                let radius = Math.sqrt(normalizedIndex) * params.coreRadius;

                angle += GOLDEN_ANGLE * normalizedIndex * 2;

                let spiralX = centerX + radius * Math.cos(angle);
                let spiralY = centerY + radius * Math.sin(angle);

                let offsetAngle = random(TWO_PI);
                let offsetDist = randomGaussian(0, params.coreRadius * 0.15);
                let finalX = spiralX + Math.cos(offsetAngle) * offsetDist;
                let finalY = spiralY + Math.sin(offsetAngle) * offsetDist;

                let fitness = calculateFitness(i, normalizedIndex, radius);

                particles.push({
                    x: finalX,
                    y: finalY,
                    originalX: finalX,
                    originalY: finalY,
                    size: map(normalizedIndex, 0, 1, 8, 2) + randomGaussian(0, 1),
                    normalizedIndex: normalizedIndex,
                    radius: radius,
                    fitness: fitness,
                    color: getColorForPosition(normalizedIndex, radius),
                    age: 0,
                    maxAge: floor(random(100, 300))
                });
            }
        }

        function calculateFitness(index, normalizedIndex, radius) {
            let coreBonus = map(normalizedIndex, 0, 0.3, 2, 1);
            let spiralBonus = 1 + noise(index * 0.1) * 0.5;
            let radiusFactor = map(radius, 0, params.coreRadius, 1.2, 0.6);

            return coreBonus * spiralBonus * radiusFactor;
        }

        function getColorForPosition(normalizedIndex, radius) {
            let coreColorObj = hexToRgb(params.coreColor);
            let edgeColorObj = hexToRgb(params.edgeColor);
            let accentColorObj = hexToRgb(params.accentColor);

            let t = normalizedIndex;
            let r, g, b;

            if (t < 0.3) {
                let localT = t / 0.3;
                r = lerp(coreColorObj.r, accentColorObj.r, localT);
                g = lerp(coreColorObj.g, accentColorObj.g, localT);
                b = lerp(coreColorObj.b, accentColorObj.b, localT);
            } else {
                let localT = (t - 0.3) / 0.7;
                r = lerp(accentColorObj.r, edgeColorObj.r, localT);
                g = lerp(accentColorObj.g, edgeColorObj.g, localT);
                b = lerp(accentColorObj.b, edgeColorObj.b, localT);
            }

            let radiusFade = map(radius, 0, params.coreRadius, 1, 0.3);
            r *= radiusFade;
            g *= radiusFade;
            b *= radiusFade;

            return {r, g, b, a: map(normalizedIndex, 0, 1, 200, 80)};
        }

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : {r: 0, g: 0, b: 0};
        }

        function evolveOnce() {
            let centerX = width / 2;
            let centerY = height / 2;

            for (let p of particles) {
                let toCenterX = centerX - p.x;
                let toCenterY = centerY - p.y;
                let distToCenter = Math.sqrt(toCenterX * toCenterX + toCenterY * toCenterY);

                let fitnessBoost = p.fitness * params.evolutionSpeed * 0.1;
                let moveStrength = fitnessBoost;

                let angle = atan2(toCenterY, toCenterX);
                angle += (random() - 0.5) * 0.3;

                let moveX = cos(angle) * moveStrength;
                let moveY = sin(angle) * moveStrength;

                p.x += moveX;
                p.y += moveY;

                let spiralOffset = randomGaussian(0, 2);
                p.x += cos(p.normalizedIndex * TWO_PI * PHI) * spiralOffset;
                p.y += sin(p.normalizedIndex * TWO_PI * PHI) * spiralOffset;

                let distFromCenter = Math.sqrt(
                    Math.pow(p.x - centerX, 2) + Math.pow(p.y - centerY, 2)
                );
                let targetDist = p.normalizedIndex * params.coreRadius;
                let distDiff = targetDist - distFromCenter;
                p.x += (distDiff / distFromCenter) * 0.5;
                p.y += (distDiff / distFromCenter) * 0.5;

                p.age++;
            }
        }

        function drawFinal() {
            background(250, 249, 245);

            drawGoldenSpiralGuide();

            particles.sort((a, b) => a.fitness - b.fitness);

            for (let p of particles) {
                let col = p.color;

                noStroke();
                fill(col.r, col.g, col.b, col.a * 0.6);
                ellipse(p.x, p.y, p.size * 2, p.size * 2);

                fill(col.r, col.g, col.b, col.a * 0.3);
                ellipse(p.x, p.y, p.size * 4, p.size * 4);
            }

            drawCoreGlow();

            drawValueLabels();
        }

        function drawGoldenSpiralGuide() {
            let centerX = width / 2;
            let centerY = height / 2;

            let coreColorObj = hexToRgb(params.coreColor);
            stroke(coreColorObj.r, coreColorObj.g, coreColorObj.b, 30);
            noFill();
            strokeWeight(1);

            beginShape();
            for (let i = 0; i <= 100; i++) {
                let t = i / 100;
                let angle = t * TWO_PI * 2 * PHI;
                let radius = t * params.coreRadius * 1.2;
                let x = centerX + radius * Math.cos(angle);
                let y = centerY + radius * Math.sin(angle);
                vertex(x, y);
            }
            endShape();
        }

        function drawCoreGlow() {
            let centerX = width / 2;
            let centerY = height / 2;
            let coreColorObj = hexToRgb(params.coreColor);

            for (let i = 5; i > 0; i--) {
                let size = i * 60;
                let alpha = map(i, 5, 0, 5, 30);
                fill(coreColorObj.r, coreColorObj.g, coreColorObj.b, alpha);
                noStroke();
                ellipse(centerX, centerY, size, size);
            }
        }

        function drawValueLabels() {
            textFont('Poppins');
            textAlign(CENTER, CENTER);

            fill(180, 175, 165);
            textSize(12);
            text('MVP · CORE VALUE · 核心价值', width / 2, height - 30);

            fill(200, 195, 185);
            textSize(10);
            text('Seed: ' + params.seed + ' | Particles: ' + particles.length, width / 2, height - 15);
        }

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;

            if (paramName === 'coreParticles' || paramName === 'coreRadius' || 
                paramName === 'spiralDensity') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            params[colorId] = value;
            document.getElementById(colorId + '-value').textContent = value;

            for (let p of particles) {
                p.color = getColorForPosition(p.normalizedIndex, p.radius);
            }

            drawFinal();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function regenerate() {
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};

            document.getElementById('coreParticles').value = params.coreParticles;
            document.getElementById('coreParticles-value').textContent = params.coreParticles;
            document.getElementById('coreRadius').value = params.coreRadius;
            document.getElementById('coreRadius-value').textContent = params.coreRadius;
            document.getElementById('spiralDensity').value = params.spiralDensity;
            document.getElementById('spiralDensity-value').textContent = params.spiralDensity;
            document.getElementById('evolutionSpeed').value = params.evolutionSpeed;
            document.getElementById('evolutionSpeed-value').textContent = params.evolutionSpeed;

            document.getElementById('coreColor').value = params.coreColor;
            document.getElementById('coreColor-value').textContent = params.coreColor;
            document.getElementById('edgeColor').value = params.edgeColor;
            document.getElementById('edgeColor-value').textContent = params.edgeColor;
            document.getElementById('accentColor').value = params.accentColor;
            document.getElementById('accentColor-value').textContent = params.accentColor;

            updateSeedDisplay();
            initializeSystem();
        }

        function downloadImage() {
            saveCanvas('mvp-core-value-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
